spring:
  application:
    name: component-reservation-shred-test
  
  # Database Configuration - Using H2 in-memory database for tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 5
      minimum-idle: 2
      pool-name: TestComponentReservationPool
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.SnakeCasePhysicalNamingStrategy
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
  
  # ActiveMQ Configuration - Will use embedded broker
  activemq:
    broker-url: vm://localhost?broker.persistent=false
    user: test_user
    password: test_password
    pool:
      enabled: true
      max-connections: 5
      idle-timeout: 30000
    packages:
      trust-all: true
      trusted: ai.shreds
  
  # JMS Configuration
  jms:
    pub-sub-domain: true
    template:
      default-destination: inventory.reservations.test
      delivery-mode: non_persistent
      priority: 4
      time-to-live: 3600000
      receive-timeout: 10000
  
  # Security Configuration - Disabled for testing
  security:
    user:
      name: test_admin
      password: test_password
      roles: ADMIN
  
  # Scheduling Configuration
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: test-reservation-scheduler-
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 50
        keep-alive: 60s
      thread-name-prefix: test-reservation-executor-

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

  # Spring Boot Configuration
  main:
    allow-circular-references: true
    lazy-initialization: true
  
  # Auto-configuration exclusions - exclude GPS-related components
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jms.JmsAutoConfiguration

# Server Configuration
server:
  port: 0  # Random port for testing
  servlet:
    context-path: /
  
# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
    info:
      enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    ai.shreds: DEBUG
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.jms: DEBUG
    org.springframework.security: WARN
    org.testcontainers: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Application-specific Configuration
reservation:
  expiration:
    cron: "0 */1 * * * *"  # Every minute for testing
    batch-size: 10
    processing-delay: 1000
  
  topics:
    reservation-created: "test.inventory.reservations.created"
    reservation-expired: "test.inventory.reservations.expired"
    reservation-consumed: "test.inventory.reservations.consumed"
    reservation-cancelled: "test.inventory.reservations.cancelled"
    stock-level-updated: "test.inventory.stock.updated"
  
  validation:
    max-expiration-days: 30
    min-quantity: 0.0001
    max-quantity: 999999.9999
  
  database:
    lock-timeout: 10000
    retry-attempts: 3
    retry-delay: 500

# Transaction Configuration
transaction:
  default-timeout: 30
  rollback-on-commit-failure: true